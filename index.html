<!DOCTYPE html>
<html lang="sv" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSCE Studieportal — Umeå Universitet</title>
  <style>
    /* ── FONTS ───────────────────────────────────────────── */
    @font-face {
      font-family: 'Monigue';
      src: url('assets/Monigue.woff2') format('woff2');
      font-weight: 400 900;
      font-style: normal;
      font-display: swap;
    }

    /* ── RESET ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── DESIGN TOKENS ───────────────────────────────────── */
    :root {
      /* Neutrals */
      --bg:        #f0ebe0;
      --surface:   #ffffff;
      --surface-2: #f7f3ec;
      --text:      #1a1816;
      --muted:     #8a8480;
      --accent:    #1a1816;
      --accent-fg: #f0ebe0;

      /* Palette — Intelly */
      --yellow:      #F5D867;
      --yellow-text: #2a2000;
      --pink:        #F5B8DB;
      --pink-text:   #350020;
      --blue:        #B6CAEB;
      --blue-text:   #0a1428;
      --olive:       #9AAB63;
      --olive-text:  #1a2200;

      /* Semantic */
      --lime:        #c8f53c;
      --lime-text:   #1a2800;
      --green:       #16a34a;
      --orange:      #c2410c;
      --danger:      #dc2626;

      --r:    16px;
      --r-sm: 10px;
      --r-xs: 6px;
      --r-full: 999px;
      --t:    0.22s ease;
    }

    [data-theme="dark"] {
      --bg:        #1a1816;
      --surface:   #242220;
      --surface-2: #2e2b28;
      --text:      #f0ebe0;
      --muted:     #8a8480;
      --accent:    #f0ebe0;
      --accent-fg: #1a1816;
    }

    /* ── BASE ────────────────────────────────────────────── */
    html { color-scheme: light dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.55;
      transition: background var(--t), color var(--t);
    }

    /* ── TYPOGRAPHY ──────────────────────────────────────── */
    .font-display {
      font-family: 'Monigue', -apple-system, system-ui, sans-serif;
      letter-spacing: -.02em;
    }
    h1 { font-family: 'Monigue', system-ui, sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -.03em; line-height: 1.1; }
    h2 { font-family: 'Monigue', system-ui, sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -.02em; }

    /* Section pill labels (dashed, like Intelly) */
    .pill-label {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 13px; border-radius: var(--r-full);
      border: 1.5px dashed var(--muted);
      font-size: 11px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
    }

    /* ── NAV ─────────────────────────────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      height: 60px; padding: 0 24px;
      display: flex; align-items: center; gap: 6px;
      transition: background var(--t);
    }
    .nav-logo {
      font-family: 'Monigue', system-ui, sans-serif;
      font-weight: 800; font-size: 18px; letter-spacing: -.03em;
      color: var(--text); text-decoration: none;
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .nav-logo-mark {
      width: 32px; height: 32px; border-radius: var(--r-sm);
      background: var(--text); color: var(--accent-fg);
      display: grid; place-items: center;
      font-size: 14px; font-weight: 900; letter-spacing: 0; flex-shrink: 0;
    }
    .nav-spacer { flex: 1; }
    .nav-tabs { display: flex; gap: 2px; }
    .nav-tab {
      padding: 7px 14px; border-radius: var(--r-full);
      font-size: 13px; font-weight: 500; color: var(--muted);
      cursor: pointer; border: none; background: none;
      transition: color .12s, background .12s; white-space: nowrap;
    }
    .nav-tab:hover { color: var(--text); background: var(--surface); }
    .nav-tab.active { color: var(--text); font-weight: 600; background: var(--surface); }
    .nav-actions { display: flex; gap: 6px; align-items: center; }
    .nav-icon-btn {
      width: 36px; height: 36px; border-radius: var(--r-full);
      background: var(--surface); color: var(--muted);
      cursor: pointer; display: grid; place-items: center;
      font-size: 16px; border: none;
      transition: color .12s, background .12s;
    }
    .nav-icon-btn:hover { color: var(--text); background: var(--surface-2); }
    @media (max-width: 580px) { .nav-tabs { display: none; } }

    /* ── LAYOUT ──────────────────────────────────────────── */
    #app { min-height: calc(100vh - 60px); }
    .page { display: none; }
    .page.active { display: block; }
    .container { max-width: 920px; margin: 0 auto; padding: 44px 24px; }

    /* ── BUTTONS ─────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border-radius: var(--r-full);
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: none; white-space: nowrap; text-decoration: none;
      transition: opacity .12s, background .12s;
    }
    .btn-dark { background: var(--text); color: var(--accent-fg); }
    .btn-dark:hover { opacity: .82; }
    .btn-ghost { background: var(--surface); color: var(--text); }
    .btn-ghost:hover { background: var(--surface-2); }
    .btn-lime { background: var(--lime); color: var(--lime-text); }
    .btn-lime:hover { filter: brightness(.93); }
    .btn-sm { padding: 6px 13px; font-size: 12px; }

    /* ── HOME ────────────────────────────────────────────── */
    .home-header { margin-bottom: 40px; }
    .home-header p { color: var(--muted); margin-top: 8px; font-size: 15px; }

    .osce-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .osce-card {
      border-radius: var(--r);
      padding: 26px 24px 22px;
      cursor: pointer; text-decoration: none; color: var(--text);
      display: block; position: relative; overflow: hidden;
      transition: transform .15s, filter .15s;
    }
    .osce-card:hover { transform: translateY(-2px); filter: brightness(.97); }
    .osce-card[data-level="1"] { background: var(--yellow); }
    .osce-card[data-level="2"] { background: var(--pink); }
    .osce-card[data-level="3"] { background: var(--blue); }
    [data-theme="dark"] .osce-card[data-level="1"] { background: #3a2e00; }
    [data-theme="dark"] .osce-card[data-level="2"] { background: #3a0a20; }
    [data-theme="dark"] .osce-card[data-level="3"] { background: #0a1628; }
    [data-theme="dark"] .osce-card { color: var(--text); }

    .osce-card-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 20px;
    }
    .osce-level-tag {
      font-size: 11px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase;
      opacity: .55; background: rgba(0,0,0,.1); padding: 3px 10px; border-radius: var(--r-full);
    }
    .osce-title {
      font-family: 'Monigue', system-ui, sans-serif;
      font-size: 26px; font-weight: 800; letter-spacing: -.04em;
      margin-bottom: 4px;
    }
    .osce-sub { font-size: 12px; opacity: .6; margin-bottom: 22px; font-weight: 500; }
    .prog-track {
      height: 4px; background: rgba(0,0,0,.12); border-radius: var(--r-full);
      overflow: hidden; margin-bottom: 8px;
    }
    .prog-fill {
      height: 100%; background: rgba(0,0,0,.4); border-radius: var(--r-full);
      transition: width .4s ease;
    }
    .prog-label { font-size: 12px; opacity: .6; font-weight: 600; font-variant-numeric: tabular-nums; }
    .home-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── LIST ────────────────────────────────────────────── */
    .list-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; background: var(--surface); border-radius: var(--r-full);
      font-size: 13px; font-weight: 500; cursor: pointer; color: var(--muted);
      border: none; text-decoration: none; transition: background .12s, color .12s;
    }
    .back-btn:hover { color: var(--text); background: var(--surface-2); }

    .filter-row { display: flex; align-items: center; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-chip {
      padding: 6px 16px; border-radius: var(--r-full);
      background: var(--surface); font-size: 13px; font-weight: 500;
      cursor: pointer; color: var(--muted); border: none; transition: all .12s;
    }
    .filter-chip:hover { color: var(--text); background: var(--surface-2); }
    .filter-chip.active { background: var(--text); color: var(--accent-fg); }
    .filter-spacer { flex: 1; }

    /* ── EXAM CARDS ──────────────────────────────────────── */
    .exam-grid { display: grid; gap: 8px; }
    .exam-card {
      background: var(--surface); border-radius: var(--r);
      padding: 17px 20px; display: flex; align-items: center; gap: 16px;
      transition: background .12s;
    }
    .exam-card:hover { background: var(--surface-2); }
    .exam-card.done { background: #f0fce6; }
    [data-theme="dark"] .exam-card.done { background: #182410; }
    .exam-card-body { flex: 1; min-width: 0; cursor: pointer; }
    .exam-semester {
      font-family: 'Monigue', system-ui, sans-serif;
      font-size: 17px; font-weight: 700; letter-spacing: -.02em;
    }
    .exam-card.done .exam-semester { color: var(--olive); }
    [data-theme="dark"] .exam-card.done .exam-semester { color: #8fbb4a; }

    .exam-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .type-badge {
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: var(--r-full); letter-spacing: .1px; border: none;
    }
    .type-badge.ord { background: var(--blue); color: var(--blue-text); }
    .type-badge.om  { background: var(--pink); color: var(--pink-text); }
    [data-theme="dark"] .type-badge.ord { background: #1a2e50; color: #93b4e0; }
    [data-theme="dark"] .type-badge.om  { background: #3a1030; color: #e090c4; }

    .file-count { font-size: 12px; color: var(--muted); }
    .tags-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
    .tag-pill {
      font-size: 11px; padding: 2px 8px; background: var(--surface-2);
      border-radius: var(--r-full); color: var(--muted); border: none;
    }
    .done-toggle { flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
    .check-input { width: 16px; height: 16px; accent-color: var(--olive); cursor: pointer; }
    .check-label { font-size: 12px; color: var(--muted); white-space: nowrap; cursor: pointer; user-select: none; }

    /* ── EXAM VIEW ───────────────────────────────────────── */
    .exam-bar {
      background: var(--surface); padding: 12px 24px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      transition: background var(--t);
    }
    .exam-bar-title {
      font-family: 'Monigue', system-ui, sans-serif;
      font-weight: 700; font-size: 15px; flex: 1; min-width: 0; letter-spacing: -.02em;
    }
    .exam-bar-actions { display: flex; gap: 8px; }
    .circle-bar {
      background: var(--surface-2); padding: 8px 24px;
      display: flex; align-items: center; gap: 12px;
    }
    .circle-select {
      padding: 5px 12px; border: none; border-radius: var(--r-full);
      font-size: 13px; background: var(--surface); color: var(--text); cursor: pointer;
    }
    .circle-bar-label { font-size: 11px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: var(--muted); }

    .pdf-container { height: calc(100vh - 60px - 50px); display: flex; overflow: hidden; }
    .pdf-container.has-circles { height: calc(100vh - 60px - 50px - 40px); }
    .pdf-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .pdf-pane + .pdf-pane { border-left: 1px solid var(--surface-2); }
    .pdf-pane-label {
      padding: 7px 16px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .8px; color: var(--muted);
      background: var(--surface-2); flex-shrink: 0;
    }
    .pdf-pane iframe { flex: 1; width: 100%; border: none; background: var(--surface-2); }
    @media (max-width: 640px) {
      .pdf-container { flex-direction: column; height: auto; }
      .pdf-pane { height: 60vh; }
      .pdf-pane + .pdf-pane { border-left: none; border-top: 1px solid var(--surface-2); }
    }

    /* ── TAGS PAGE ───────────────────────────────────────── */
    .tags-cloud { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0 30px; }
    .tag-btn {
      padding: 8px 18px; border-radius: var(--r-full);
      background: var(--surface); font-size: 13px; font-weight: 500;
      cursor: pointer; color: var(--muted); border: none; transition: all .12s;
    }
    .tag-btn:hover { background: var(--surface-2); color: var(--text); }
    .tag-btn.active { background: var(--text); color: var(--accent-fg); }
    .divider { height: 1px; background: var(--surface-2); margin: 24px 0; }

    /* ── EMPTY STATE ─────────────────────────────────────── */
    .empty-state { text-align: center; padding: 64px 20px; color: var(--muted); }
    .empty-state p { margin-top: 8px; font-size: 14px; }

    /* ── SEARCH OVERLAY ──────────────────────────────────── */
    .search-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: var(--bg); display: none; flex-direction: column;
      transition: background var(--t);
    }
    .search-overlay.open { display: flex; }
    .search-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 24px; background: var(--surface); flex-shrink: 0;
    }
    .search-input-wrap {
      flex: 1; display: flex; align-items: center; gap: 10px;
      background: var(--surface-2); border-radius: var(--r-full);
      padding: 9px 16px; border: none;
    }
    .search-input-wrap svg { flex-shrink: 0; color: var(--muted); }
    #search-input {
      flex: 1; border: none; background: transparent;
      font-size: 15px; color: var(--text); outline: none;
    }
    #search-input::placeholder { color: var(--muted); }
    .search-body {
      flex: 1; overflow-y: auto; padding: 20px 24px;
      max-width: 820px; width: 100%; margin: 0 auto;
    }
    .search-hint { text-align: center; padding: 52px 20px; color: var(--muted); font-size: 14px; }
    .search-hint code {
      display: block; margin-top: 14px; padding: 10px 16px;
      background: var(--surface); border-radius: var(--r-sm);
      font-family: monospace; font-size: 13px; color: var(--text);
    }
    .result-card {
      border-radius: var(--r); padding: 16px 18px;
      margin-bottom: 8px; background: var(--surface); transition: background .12s;
    }
    .result-card:hover { background: var(--surface-2); }
    .result-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .result-station { font-family: 'Monigue', system-ui, sans-serif; font-weight: 700; font-size: 15px; letter-spacing: -.02em; }
    .result-exam { font-size: 12px; color: var(--muted); }
    .result-excerpt {
      font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .result-excerpt mark { background: var(--yellow); color: var(--yellow-text); border-radius: 3px; padding: 0 2px; }
    .result-actions { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ── PDF MODAL ───────────────────────────────────────── */
    .pdf-modal {
      position: fixed; inset: 0; z-index: 300;
      display: none; flex-direction: column; background: var(--surface);
    }
    .pdf-modal.open { display: flex; }
    .pdf-modal-header {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 24px; background: var(--surface-2); flex-shrink: 0;
    }
    .pdf-modal-title { flex: 1; font-family: 'Monigue', system-ui, sans-serif; font-weight: 700; font-size: 14px; letter-spacing: -.02em; }
    #pdf-modal-frame { flex: 1; border: none; background: var(--surface-2); }

    /* ── TIMER ───────────────────────────────────────────── */
    .timer-widget { position: fixed; bottom: 24px; right: 24px; z-index: 150; }
    .timer-fab {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--text); color: var(--accent-fg);
      border: none; cursor: pointer; display: grid; place-items: center;
      transition: transform .15s, background .2s;
    }
    .timer-fab:hover { transform: scale(1.06); }
    .timer-fab.running { background: var(--timer-color, #2454e8); }
    .timer-panel {
      display: none; background: var(--surface); border-radius: var(--r);
      width: 276px; overflow: hidden; margin-bottom: 10px;
      transition: background var(--t);
    }
    .timer-panel.open { display: block; }
    .timer-panel-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 10px; background: var(--surface-2);
    }
    .timer-phase-name {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--muted);
    }
    .timer-x { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; padding: 0; }
    .timer-x:hover { color: var(--text); }
    .timer-ring-wrap { display: flex; justify-content: center; padding: 22px 0 16px; }
    .timer-ring-container { position: relative; width: 140px; height: 140px; }
    .timer-ring-container svg { position: absolute; top: 0; left: 0; }
    .timer-time {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -56%);
      font-family: 'Monigue', system-ui, sans-serif;
      font-size: 30px; font-weight: 800; letter-spacing: -.04em;
      color: var(--text); font-variant-numeric: tabular-nums;
    }
    .timer-phase-sub {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, 52%);
      font-size: 10px; color: var(--muted); font-weight: 600;
      white-space: nowrap; text-transform: uppercase; letter-spacing: .5px;
    }
    .timer-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 14px 16px; }
    .tbtn {
      padding: 8px 0; border-radius: var(--r-full); border: none;
      background: var(--surface-2); color: var(--text); font-size: 12px; font-weight: 600;
      cursor: pointer; text-align: center; transition: background .12s;
    }
    .tbtn:hover { background: var(--bg); }
    .tbtn:disabled { opacity: .3; cursor: not-allowed; }
    .tbtn-start { background: var(--text); color: var(--accent-fg); grid-column: 1 / -1; }
    .tbtn-start:hover { opacity: .83; background: var(--text); }
    .tbtn-start:disabled { opacity: .3; }
  </style>
</head>
<body>

<!-- ── NAV ──────────────────────────────────────────────── -->
<nav>
  <a class="nav-logo" onclick="navigate('/')">
    <div class="nav-logo-mark">O</div>
    OSCE
  </a>
  <div class="nav-tabs">
    <button class="nav-tab" onclick="navigate('/osce/1')">OSCE I</button>
    <button class="nav-tab" onclick="navigate('/osce/2')">OSCE II</button>
    <button class="nav-tab" onclick="navigate('/osce/3')">OSCE III</button>
    <button class="nav-tab" onclick="navigate('/tags')">Ämnen</button>
  </div>
  <div class="nav-spacer"></div>
  <div class="nav-actions">
    <button class="nav-icon-btn" onclick="openSearch()" title="Sök">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
    <button class="nav-icon-btn" id="darkmode-btn" onclick="toggleDarkMode()" title="Växla tema">🌙</button>
  </div>
</nav>

<!-- ── SEARCH OVERLAY ────────────────────────────────────── -->
<div class="search-overlay" id="search-overlay">
  <div class="search-header">
    <div class="search-input-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-input" type="text" placeholder="Sök station, diagnos, åtgärd…"
        oninput="onSearchInput(this.value)"
        onkeydown="if(event.key==='Escape')closeSearch()">
    </div>
    <button class="btn btn-ghost btn-sm" onclick="closeSearch()">Stäng</button>
  </div>
  <div class="search-body" id="search-body">
    <div class="search-hint">Laddar sökindex…</div>
  </div>
</div>

<!-- ── PDF MODAL ─────────────────────────────────────────── -->
<div class="pdf-modal" id="pdf-modal">
  <div class="pdf-modal-header">
    <button class="back-btn" onclick="closePDFModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Stäng
    </button>
    <div class="pdf-modal-title" id="pdf-modal-title"></div>
  </div>
  <iframe id="pdf-modal-frame" src="" title="PDF"></iframe>
</div>

<!-- ── APP ───────────────────────────────────────────────── -->
<div id="app">

  <!-- HOME -->
  <div class="page" id="page-home">
    <div class="container">
      <div class="home-header">
        <h1>OSCE Studieportal</h1>
        <p>Umeå Universitet — Läkarprogrammet</p>
      </div>
      <div class="pill-label">Examinationsnivåer</div>
      <div class="osce-grid" id="osce-cards"></div>
      <div class="home-actions">
        <button class="btn btn-dark" onclick="randomExam(null)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8.5" cy="8.5" r="1.3" fill="currentColor"/><circle cx="15.5" cy="8.5" r="1.3" fill="currentColor"/><circle cx="8.5" cy="15.5" r="1.3" fill="currentColor"/><circle cx="15.5" cy="15.5" r="1.3" fill="currentColor"/><circle cx="12" cy="12" r="1.3" fill="currentColor"/></svg>
          Slumpa station
        </button>
        <button class="btn btn-ghost" onclick="navigate('/tags')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          Filtrera på ämne
        </button>
      </div>
    </div>
  </div>

  <!-- LIST -->
  <div class="page" id="page-list">
    <div class="container">
      <div class="list-header">
        <button class="back-btn" onclick="navigate('/')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          Tillbaka
        </button>
        <h2 id="list-title"></h2>
      </div>
      <div class="filter-row" id="filter-row">
        <button class="filter-chip active" data-filter="all" onclick="setFilter('all')">Alla</button>
        <button class="filter-chip" data-filter="ord" onclick="setFilter('ord')">Ordinarie</button>
        <button class="filter-chip" data-filter="om" onclick="setFilter('om')">Omexamination</button>
        <div class="filter-spacer"></div>
        <button class="btn btn-dark btn-sm" onclick="randomExam(currentLevel)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8.5" cy="8.5" r="1.3" fill="currentColor"/><circle cx="15.5" cy="8.5" r="1.3" fill="currentColor"/><circle cx="8.5" cy="15.5" r="1.3" fill="currentColor"/><circle cx="15.5" cy="15.5" r="1.3" fill="currentColor"/><circle cx="12" cy="12" r="1.3" fill="currentColor"/></svg>
          Slumpa
        </button>
      </div>
      <div class="exam-grid" id="exam-list"></div>
    </div>
  </div>

  <!-- EXAM VIEW -->
  <div class="page" id="page-exam">
    <div class="exam-bar">
      <button class="back-btn" id="exam-back-btn" onclick="navigate('/')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Tillbaka
      </button>
      <div class="exam-bar-title" id="exam-bar-title"></div>
      <div class="exam-bar-actions">
        <button class="btn" id="mark-done-btn" onclick="toggleDone()">Markera som klar</button>
      </div>
    </div>
    <div class="circle-bar" id="circle-bar" style="display:none">
      <span class="circle-bar-label">Cirkel</span>
      <select class="circle-select" id="circle-select" onchange="renderCircle(this.value)"></select>
    </div>
    <div class="pdf-container" id="pdf-container"></div>
  </div>

  <!-- TAGS -->
  <div class="page" id="page-tags">
    <div class="container">
      <div class="list-header">
        <button class="back-btn" onclick="navigate('/')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          Tillbaka
        </button>
        <h2>Filtrera på ämne</h2>
      </div>
      <div class="tags-cloud" id="tags-cloud"></div>
      <div class="divider"></div>
      <div class="exam-grid" id="tags-exam-list"></div>
    </div>
  </div>

</div>

<!-- ── TIMER ──────────────────────────────────────────────── -->
<div class="timer-widget" id="timer-widget">
  <div class="timer-panel" id="timer-panel">
    <div class="timer-panel-top">
      <div class="timer-phase-name" id="timer-phase-name">Läs dörrinformation</div>
      <button class="timer-x" onclick="toggleTimerPanel()">×</button>
    </div>
    <div class="timer-ring-wrap">
      <div class="timer-ring-container">
        <svg viewBox="0 0 100 100" width="140" height="140">
          <circle cx="50" cy="50" r="44" fill="none" stroke="var(--surface-2)" stroke-width="5"/>
          <circle id="timer-ring" cx="50" cy="50" r="44" fill="none"
            stroke="#2454e8" stroke-width="5" stroke-linecap="round"
            stroke-dasharray="276.46" stroke-dashoffset="0"
            transform="rotate(-90 50 50)"/>
        </svg>
        <div class="timer-time" id="timer-time">2:00</div>
        <div class="timer-phase-sub" id="timer-phase-sub">Läsfas</div>
      </div>
    </div>
    <div class="timer-controls">
      <button class="tbtn tbtn-start" id="tbtn-start" onclick="timerStart()">Start</button>
      <button class="tbtn" id="tbtn-pause" onclick="timerPause()" disabled>Pausa</button>
      <button class="tbtn" onclick="timerReset()">Återställ</button>
      <button class="tbtn" onclick="timerJumpStation()">→ Station</button>
    </div>
  </div>
  <button class="timer-fab" id="timer-fab" onclick="toggleTimerPanel()" title="Timer">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
  </button>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────
let allExams = [];
let currentFilter = 'all';
let currentLevel = 1;
let currentExam = null;
let selectedTag = null;

// ── INIT ──────────────────────────────────────────────────
async function init() {
  initDarkMode();
  try {
    const res = await fetch('exams.json');
    const data = await res.json();
    allExams = data.exams;
  } catch (e) {
    console.error('Failed to load exams.json', e);
    allExams = [];
  }
  route();
  window.addEventListener('hashchange', route);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeSearch(); closePDFModal(); }
  });
}

// ── ROUTING ───────────────────────────────────────────────
function navigate(path) { window.location.hash = path; }

function route() {
  const hash = window.location.hash.replace('#', '') || '/';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));

  if (hash === '/' || hash === '') {
    document.getElementById('page-home').classList.add('active');
    renderHome();
  } else if (hash.startsWith('/osce/')) {
    const level = parseInt(hash.split('/')[2]);
    currentLevel = level;
    currentFilter = 'all';
    document.getElementById('page-list').classList.add('active');
    renderList(level);
    const labels = ['OSCE I', 'OSCE II', 'OSCE III'];
    document.querySelectorAll('.nav-tab').forEach(t => {
      if (t.textContent === labels[level - 1]) t.classList.add('active');
    });
  } else if (hash.startsWith('/exam/')) {
    const id = hash.replace('/exam/', '');
    currentExam = allExams.find(e => e.id === id) || null;
    document.getElementById('page-exam').classList.add('active');
    renderExamView(currentExam);
  } else if (hash === '/tags') {
    document.getElementById('page-tags').classList.add('active');
    document.querySelectorAll('.nav-tab').forEach(t => {
      if (t.textContent === 'Ämnen') t.classList.add('active');
    });
    renderTagsPage();
  }
}

// ── LOCALSTORAGE ──────────────────────────────────────────
function isDone(id) { return localStorage.getItem('osce_done_' + id) === 'true'; }
function setDone(id, val) { localStorage.setItem('osce_done_' + id, val ? 'true' : 'false'); }

// ── HOME ──────────────────────────────────────────────────
function renderHome() {
  const lvls = [
    { level: 1, title: 'OSCE I',   sub: 'Termin 6' },
    { level: 2, title: 'OSCE II',  sub: 'Termin 8' },
    { level: 3, title: 'OSCE III', sub: 'Termin 11' },
  ];
  document.getElementById('osce-cards').innerHTML = lvls.map(l => {
    const exams = allExams.filter(e => e.level === l.level);
    const done  = exams.filter(e => isDone(e.id)).length;
    const pct   = exams.length ? Math.round((done / exams.length) * 100) : 0;
    return `<a class="osce-card" data-level="${l.level}" onclick="navigate('/osce/${l.level}')">
      <div class="osce-card-top">
        <span class="osce-level-tag">T${[6,8,11][l.level-1]}</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" opacity=".4"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="osce-title">${l.title}</div>
      <div class="osce-sub">${l.sub} — Läkarprogrammet</div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-label">${done} av ${exams.length} klara</div>
    </a>`;
  }).join('');
}

// ── LIST ──────────────────────────────────────────────────
function renderList(level) {
  const titles = { 1: 'OSCE I', 2: 'OSCE II', 3: 'OSCE III' };
  document.getElementById('list-title').textContent = titles[level];
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.filter === currentFilter);
  });
  const exams = allExams
    .filter(e => e.level === level)
    .filter(e => currentFilter === 'all' || e.type === currentFilter)
    .sort((a, b) => b.semesterSort.localeCompare(a.semesterSort));
  const container = document.getElementById('exam-list');
  container.innerHTML = exams.length
    ? exams.map(examCardHTML).join('')
    : '<div class="empty-state"><b>Inga examinationer hittades.</b></div>';
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.filter === filter);
  });
  renderList(currentLevel);
}

function examCardHTML(e) {
  const done = isDone(e.id);
  const fc   = Object.keys(e.files).length;
  const tags = e.tags && e.tags.length
    ? `<div class="tags-row">${e.tags.map(t => `<span class="tag-pill">${t}</span>`).join('')}</div>`
    : '';
  return `<div class="exam-card${done ? ' done' : ''}" id="card-${e.id}">
    <div class="exam-card-body" onclick="navigate('/exam/${e.id}')">
      <div class="exam-semester">${e.semester}</div>
      <div class="exam-meta">
        <span class="type-badge ${e.type}">${e.typeLabel}</span>
        <span class="file-count">${fc} ${fc === 1 ? 'fil' : 'filer'}</span>
      </div>${tags}
    </div>
    <div class="done-toggle">
      <input type="checkbox" class="check-input" id="chk-${e.id}" ${done ? 'checked' : ''}
        onchange="toggleCardDone('${e.id}',this.checked)" onclick="event.stopPropagation()">
      <label class="check-label" for="chk-${e.id}" onclick="event.stopPropagation()">Klar</label>
    </div>
  </div>`;
}

function toggleCardDone(id, val) {
  setDone(id, val);
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('done', val);
  const sem = card && card.querySelector('.exam-semester');
}

// ── EXAM VIEW ─────────────────────────────────────────────
function renderExamView(exam) {
  if (!exam) { navigate('/'); return; }
  const label = `${exam.levelLabel} — ${exam.semester} ${exam.typeLabel}`;
  document.getElementById('exam-bar-title').textContent = label;
  document.title = label + ' — OSCE Studieportal';
  document.getElementById('exam-back-btn').setAttribute('onclick', `navigate('/osce/${exam.level}')`);
  updateMarkDoneBtn(exam.id);

  const files   = exam.files;
  const keys    = Object.keys(files);
  const circles = detectCircles(keys);
  const circleBar    = document.getElementById('circle-bar');
  const pdfContainer = document.getElementById('pdf-container');

  if (circles.length > 0) {
    circleBar.style.display = 'flex';
    pdfContainer.classList.add('has-circles');
    const sel = document.getElementById('circle-select');
    sel.innerHTML = circles.map(c => `<option value="${c}">${c.toUpperCase()}</option>`).join('');
    renderCircle(circles[0]);
  } else {
    circleBar.style.display = 'none';
    pdfContainer.classList.remove('has-circles');
    renderPDFPanes(files, keys, pdfContainer);
  }
}

function detectCircles(keys) {
  const s = new Set();
  keys.forEach(k => { const m = k.match(/cirkel-([a-z0-9]+)$/i); if (m) s.add(m[1]); });
  return [...s].sort();
}

function renderCircle(cirkelId) {
  if (!currentExam) return;
  const f = currentExam.files, cf = {};
  Object.entries(f).forEach(([k, v]) => {
    if (k === 'dorr' || k === `dorr_cirkel-${cirkelId}`) cf.dorr = v;
    if (k === `bed_cirkel-${cirkelId}`) cf.bed = v;
    if (k === 'kombi') cf.kombi = v;
  });
  renderPDFPanes(cf, Object.keys(cf), document.getElementById('pdf-container'));
}

function renderPDFPanes(files, keys, container) {
  if (keys.includes('kombi')) {
    container.innerHTML = `<div class="pdf-pane">
      <div class="pdf-pane-label">Dörrinstruktioner &amp; Bedömningsunderlag</div>
      <iframe src="${files.kombi}" title="Kombinerat dokument"></iframe>
    </div>`;
  } else if (keys.includes('dorr') || keys.some(k => k.startsWith('dorr'))) {
    const dk = keys.find(k => k === 'dorr' || k.startsWith('dorr'));
    const bk = keys.find(k => k === 'bed'  || k.startsWith('bed'));
    let html = '';
    if (dk) html += `<div class="pdf-pane"><div class="pdf-pane-label">Dörrinformation</div><iframe src="${files[dk]}" title="Dörrinformation"></iframe></div>`;
    if (bk) html += `<div class="pdf-pane"><div class="pdf-pane-label">Bedömningsunderlag</div><iframe src="${files[bk]}" title="Bedömningsunderlag"></iframe></div>`;
    container.innerHTML = html;
  } else if (keys.length === 1) {
    container.innerHTML = `<div class="pdf-pane"><div class="pdf-pane-label">Bedömningsunderlag</div><iframe src="${files[keys[0]]}" title="Dokument"></iframe></div>`;
  } else {
    container.innerHTML = '<div style="padding:40px;color:var(--muted)">Inga filer.</div>';
  }
}

function updateMarkDoneBtn(id) {
  const btn  = document.getElementById('mark-done-btn');
  const done = isDone(id);
  btn.textContent = done ? '✓ Klar' : 'Markera som klar';
  btn.className   = done ? 'btn btn-lime' : 'btn btn-ghost';
}

function toggleDone() {
  if (!currentExam) return;
  const v = !isDone(currentExam.id);
  setDone(currentExam.id, v);
  updateMarkDoneBtn(currentExam.id);
}

// ── TAGS ──────────────────────────────────────────────────
function renderTagsPage() {
  const allTags = [...new Set(allExams.flatMap(e => e.tags || []))].sort();
  const cloud   = document.getElementById('tags-cloud');
  if (!allTags.length) {
    cloud.innerHTML = '<p style="color:var(--muted);font-size:14px;">Inga ämnestaggar har lagts till ännu.</p>';
    document.getElementById('tags-exam-list').innerHTML = '';
    return;
  }
  cloud.innerHTML = allTags.map(t =>
    `<button class="tag-btn${selectedTag === t ? ' active' : ''}" onclick="selectTag('${t}')">${t}</button>`
  ).join('');
  renderTagsExams();
}

function selectTag(tag) {
  selectedTag = selectedTag === tag ? null : tag;
  renderTagsPage();
}

function renderTagsExams() {
  const container = document.getElementById('tags-exam-list');
  if (!selectedTag) { container.innerHTML = ''; return; }
  const exams = allExams.filter(e => e.tags && e.tags.includes(selectedTag))
    .sort((a, b) => b.semesterSort.localeCompare(a.semesterSort));
  if (!exams.length) {
    container.innerHTML = '<div class="empty-state"><b>Inga examinationer med detta ämne.</b></div>';
    return;
  }
  container.innerHTML = `<div class="pill-label">Examinationer — ${selectedTag}</div>` +
    exams.map(examCardHTML).join('');
}

// ── RANDOM ────────────────────────────────────────────────
function randomExam(levelFilter) {
  let pool = allExams;
  if (levelFilter) pool = pool.filter(e => e.level === levelFilter);
  const notDone = pool.filter(e => !isDone(e.id));
  const src = notDone.length > 0 ? notDone : pool;
  if (!src.length) return;
  navigate('/exam/' + src[Math.floor(Math.random() * src.length)].id);
}

// ── SEARCH ────────────────────────────────────────────────
let searchData   = null;
let searchStatus = 'idle';

function openSearch() {
  document.getElementById('search-overlay').classList.add('open');
  document.getElementById('search-input').focus();
  if (searchStatus === 'idle') loadSearchIndex();
}

function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
}

async function loadSearchIndex() {
  searchStatus = 'loading';
  document.getElementById('search-body').innerHTML = '<div class="search-hint">Laddar sökindex…</div>';
  try {
    const res = await fetch('search-index.json');
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    searchData   = data.stations;
    searchStatus = 'loaded';
    const q = document.getElementById('search-input').value;
    if (q.trim()) doSearch(q); else showSearchIdle();
  } catch {
    searchStatus = 'error';
    document.getElementById('search-body').innerHTML = `<div class="search-hint">
      <b>Sökindex saknas</b><br>Kör scriptet för att bygga det:
      <code>python build-search-index.py</code>
    </div>`;
  }
}

function showSearchIdle() {
  document.getElementById('search-body').innerHTML =
    '<div class="search-hint">Sök på t.ex. "auskultation", "bukpalpation" eller "fraktur".</div>';
}

function onSearchInput(val) {
  if (searchStatus === 'loaded') doSearch(val);
}

function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function doSearch(q) {
  const body = document.getElementById('search-body');
  if (!q.trim()) { showSearchIdle(); return; }
  const terms   = q.toLowerCase().trim().split(/\s+/).filter(Boolean);
  const results = (searchData || [])
    .filter(s => terms.every(t => (s.searchableText || '').toLowerCase().includes(t)))
    .slice(0, 30);
  if (!results.length) {
    body.innerHTML = '<div class="search-hint">Inga stationer matchar sökningen.</div>';
    return;
  }
  body.innerHTML = results.map(s => {
    const lvl       = ['I','II','III'][s.level - 1];
    const typeLabel = s.type === 'ord' ? 'Ordinarie' : 'Omexamination';
    const stLabel   = s.stationNumber > 0 ? `Station ${s.stationNumber}` : 'Dokument';
    const excerpt   = highlight(getExcerpt(s.searchableText || '', q), q);
    const cirkelStr = s.cirkel ? ` · ${s.cirkel}` : '';
    const dBtn = s.dorrFile
      ? `<button class="btn btn-ghost btn-sm" onclick="openPDFModal('${s.dorrFile}','Dörrinfo — ${stLabel}')">Visa dörrinfo</button>`
      : '';
    const bBtn = (!s.isKombi && s.bedFile)
      ? `<button class="btn btn-ghost btn-sm" onclick="openPDFModal('${s.bedFile}','Bedömning — ${stLabel}')">Visa bedömning</button>`
      : '';
    return `<div class="result-card">
      <div class="result-header">
        <span class="result-station">${stLabel}</span>
        <span class="type-badge ${s.type}">${typeLabel}</span>
        <span class="result-exam">OSCE ${lvl} ${s.semester}${cirkelStr}</span>
      </div>
      <div class="result-excerpt">${excerpt}</div>
      <div class="result-actions">${dBtn}${bBtn}
        <button class="btn btn-ghost btn-sm" onclick="closeSearch();navigate('/exam/${s.examId}')">Öppna examination</button>
      </div>
    </div>`;
  }).join('');
}

function getExcerpt(text, query, len = 180) {
  const term = query.trim().split(/\s+/)[0].toLowerCase();
  const idx  = text.toLowerCase().indexOf(term);
  if (idx < 0) return (text.slice(0, len) + (text.length > len ? '…' : '')).replace(/\s+/g, ' ');
  const start = Math.max(0, idx - 60);
  const end   = Math.min(text.length, start + len + 60);
  let   out   = text.slice(start, end).replace(/\s+/g, ' ');
  if (start > 0)           out = '…' + out;
  if (end < text.length)   out += '…';
  return out;
}

function highlight(text, query) {
  query.trim().split(/\s+/).filter(Boolean).forEach(term => {
    text = text.replace(new RegExp(`(${escapeRe(term)})`, 'gi'), '<mark>$1</mark>');
  });
  return text;
}

function openPDFModal(src, title) {
  document.getElementById('pdf-modal-title').textContent = title;
  document.getElementById('pdf-modal-frame').src = src;
  document.getElementById('pdf-modal').classList.add('open');
}

function closePDFModal() {
  document.getElementById('pdf-modal').classList.remove('open');
  document.getElementById('pdf-modal-frame').src = '';
}

// ── DARK MODE ─────────────────────────────────────────────
function initDarkMode() {
  const stored = localStorage.getItem('osce_darkmode');
  const theme  = stored ?? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
  updateDarkModeBtn(theme);
}

function toggleDarkMode() {
  const cur  = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('osce_darkmode', next);
  updateDarkModeBtn(next);
}

function updateDarkModeBtn(theme) {
  const btn = document.getElementById('darkmode-btn');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}

// ── TIMER ─────────────────────────────────────────────────
const CIRC = 276.46;
const PHASES = {
  read:    { label: 'Läs dörrinformation', sub: 'Läsfas',  secs: 120, color: '#2454e8' },
  station: { label: 'Station pågår',       sub: 'Station', secs: 360, color: '#16a34a' },
};

let timer    = { phase: 'read', remaining: 120, total: 120, running: false, interval: null };
let timerOpen = false;
let audioCtx  = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playBeeps(notes) {
  try {
    const ctx = getAudioCtx();
    notes.forEach(([freq, delayMs, dur = 0.15, vol = 0.28]) => {
      setTimeout(() => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + dur + 0.05);
      }, delayMs);
    });
  } catch {}
}

function timerTick() {
  timer.remaining--;
  const r = timer.remaining;
  if (timer.phase === 'station') {
    if (r === 60) playBeeps([[660, 0], [660, 250]]);
    if (r === 30) playBeeps([[880, 0], [880, 200], [880, 400]]);
  }
  if (r <= 0) {
    clearInterval(timer.interval); timer.running = false;
    if (timer.phase === 'read') {
      playBeeps([[880, 0, 0.1], [1100, 160, 0.1], [1320, 320, 0.2]]);
      setTimeout(() => {
        timer = { phase: 'station', remaining: PHASES.station.secs, total: PHASES.station.secs, running: false, interval: null };
        updateTimerUI();
      }, 700);
    } else {
      playBeeps([[880, 0, 0.3], [660, 420, 0.3], [440, 840, 0.5]]);
    }
  }
  updateTimerUI();
}

function timerStart()       { if (timer.running || timer.remaining <= 0) return; timer.running = true; timer.interval = setInterval(timerTick, 1000); updateTimerUI(); }
function timerPause()       { timer.running = false; clearInterval(timer.interval); updateTimerUI(); }
function timerReset()       { clearInterval(timer.interval); timer = { phase: 'read', remaining: PHASES.read.secs, total: PHASES.read.secs, running: false, interval: null }; updateTimerUI(); }
function timerJumpStation() { clearInterval(timer.interval); timer = { phase: 'station', remaining: PHASES.station.secs, total: PHASES.station.secs, running: false, interval: null }; updateTimerUI(); }

function updateTimerUI() {
  const { phase, remaining, total, running } = timer;
  const cfg    = PHASES[phase];
  let   color  = cfg.color;
  if (phase === 'station' && remaining <= 60) color = '#c2410c';
  if (phase === 'station' && remaining <= 30) color = '#dc2626';

  const mins    = Math.floor(remaining / 60);
  const secs    = remaining % 60;
  const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;
  const offset  = CIRC * (1 - remaining / total);

  const ring      = document.getElementById('timer-ring');
  const timeEl    = document.getElementById('timer-time');
  const sub       = document.getElementById('timer-phase-sub');
  const phaseName = document.getElementById('timer-phase-name');

  if (ring)      { ring.setAttribute('stroke-dashoffset', offset); ring.setAttribute('stroke', color); }
  if (timeEl)    { timeEl.textContent = timeStr; timeEl.style.color = remaining <= 30 ? color : ''; }
  if (sub)       sub.textContent = cfg.sub;
  if (phaseName) phaseName.textContent = cfg.label;

  const fab = document.getElementById('timer-fab');
  if (fab) { fab.classList.toggle('running', running); fab.style.setProperty('--timer-color', color); }

  const sBtn = document.getElementById('tbtn-start');
  const pBtn = document.getElementById('tbtn-pause');
  if (sBtn) sBtn.disabled = running || remaining <= 0;
  if (pBtn) pBtn.disabled = !running;
}

function toggleTimerPanel() {
  timerOpen = !timerOpen;
  document.getElementById('timer-panel').classList.toggle('open', timerOpen);
  if (timerOpen) updateTimerUI();
}

// ── START ─────────────────────────────────────────────────
init();
</script>
